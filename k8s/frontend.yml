apiVersion: v1
kind: Service
metadata:
  name: mern-frontend-service
spec:
  type: NodePort
  selector:
    app: mern-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 32640
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mern-frontend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mern-frontend
  template:
    metadata:
      labels:
        app: mern-frontend
    spec:
      containers:
      - name: mern-frontend
        image: cheezycodes/mern-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
