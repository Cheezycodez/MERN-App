apiVersion: v1
kind: Service
metadata:
  name: mern-database-service
spec:
  ports:
    - port: 27017
      protocol: TCP
      targetPort: 27017
  selector:
    app: mern-database
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mern-database-statefulset
spec:
  serviceName: "mern-database-service"
  replicas: 1
  selector:
    matchLabels:
      app: mern-database
  template:
    metadata:
      labels:
        app: mern-database
    spec:
      containers:
      - name: mern-database
        image: mongo:latest
        ports:
        - containerPort: 27017
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongodb-secret
              key: username
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-secret
              key: password
  volumeClaimTemplates:
  - metadata:
      name: mongo-persistent-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
type: Opaque
data:
  username: cm9vdA== #"root" in base64
  password: cGFzc3dvcmQ= #"password" in base64
